services:
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/money_movement
      REDIS_URL: redis://redis:6379/0
      API_KEY: ${API_KEY:-local-development-key}
      RISK_REVIEW_MODE: ${RISK_REVIEW_MODE:-policy_baseline}
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:11434/v1}
      AI_MODEL: ${AI_MODEL:-qwen2.5:7b-instruct}
      AI_API_KEY: ${AI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  outbox-worker:
    build: .
    command: ["money-movement-worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/money_movement
      REDIS_URL: redis://redis:6379/0
      API_KEY: ${API_KEY:-local-development-key}
    depends_on:
      api:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: money_movement
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d money_movement"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
